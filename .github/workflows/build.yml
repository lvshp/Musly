name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.8)'
        required: true
        type: string

env:
  FLUTTER_VERSION: '3.41.5'

permissions:
  contents: read

jobs:
  # Validate secrets exist
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.COUNTLY_SERVER_URL }}" ]; then
            echo "⚠️ Warning: COUNTLY_SERVER_URL secret not set. Analytics will be disabled."
          else
            echo "✅ COUNTLY_SERVER_URL secret is configured"
          fi
          
          if [ -z "${{ secrets.COUNTLY_APP_KEY }}" ]; then
            echo "⚠️ Warning: COUNTLY_APP_KEY secret not set. Analytics will be disabled."
          else
            echo "✅ COUNTLY_APP_KEY secret is configured (masked)"
          fi

          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "⚠️ Warning: ANDROID_KEYSTORE_BASE64 secret not set. Will use debug keystore (builds may fail signature checks)."
          else
            echo "✅ ANDROID_KEYSTORE_BASE64 secret is configured"
          fi
        continue-on-error: true

  # Android Build
  build-android:
    runs-on: ubuntu-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Dart SDK Version
        run: |
          DART_VERSION=$(dart --version | grep -oP 'Dart SDK version: \K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "✅ Dart SDK version: $DART_VERSION"
      
      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "Decoding keystore from base64..."
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/musly-release.keystore
          
          # Create key.properties
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=musly-release.keystore
          EOF
          
          echo "✅ Keystore configured for signing"
      
      - name: Build APKs (with encrypted analytics)
        env:
          COUNTLY_SERVER_URL: ${{ secrets.COUNTLY_SERVER_URL }}
          COUNTLY_APP_KEY: ${{ secrets.COUNTLY_APP_KEY }}
        run: |
          # Mask secrets in logs (GitHub does this automatically, but we double-check)
          echo "::add-mask::$COUNTLY_APP_KEY"
          echo "Building with analytics configured..."
          flutter build apk --release \
            --dart-define=COUNTLY_SERVER_URL="$COUNTLY_SERVER_URL" \
            --dart-define=COUNTLY_APP_KEY="$COUNTLY_APP_KEY"
      
      - name: Build AppBundle (with encrypted analytics)
        env:
          COUNTLY_SERVER_URL: ${{ secrets.COUNTLY_SERVER_URL }}
          COUNTLY_APP_KEY: ${{ secrets.COUNTLY_APP_KEY }}
        run: |
          echo "::add-mask::$COUNTLY_APP_KEY"
          flutter build appbundle --release \
            --dart-define=COUNTLY_SERVER_URL="$COUNTLY_SERVER_URL" \
            --dart-define=COUNTLY_APP_KEY="$COUNTLY_APP_KEY"
      
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  # iOS Build (macOS required)
  build-ios:
    runs-on: macos-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Dart SDK Version
        run: |
          DART_VERSION=$(dart --version | grep -oP 'Dart SDK version: \K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "✅ Dart SDK version: $DART_VERSION"
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS (no codesign for testing)
        env:
          COUNTLY_SERVER_URL: ${{ secrets.COUNTLY_SERVER_URL }}
          COUNTLY_APP_KEY: ${{ secrets.COUNTLY_APP_KEY }}
        run: |
          echo "::add-mask::$COUNTLY_APP_KEY"
          flutter build ios --release --no-codesign \
            --dart-define=COUNTLY_SERVER_URL="$COUNTLY_SERVER_URL" \
            --dart-define=COUNTLY_APP_KEY="$COUNTLY_APP_KEY"
      
      - name: Create IPA
        run: |
          ls -la build/ios/
          cd build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r ../../../musly-ios.ipa Payload
          cd ../../..
      
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: musly-ios.ipa

  # Windows Build
  build-windows:
    runs-on: windows-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Dart SDK Version
        shell: pwsh
        run: |
          $DART_VERSION = (dart --version 2>&1 | Select-String -Pattern 'Dart SDK version: ([0-9]+\.[0-9]+\.[0-9]+)').Matches.Groups[1].Value
          Write-Host "✅ Dart SDK version: $DART_VERSION"
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Windows
        env:
          COUNTLY_SERVER_URL: ${{ secrets.COUNTLY_SERVER_URL }}
          COUNTLY_APP_KEY: ${{ secrets.COUNTLY_APP_KEY }}
        run: |
          $key = $env:COUNTLY_APP_KEY
          Write-Host "::add-mask::$key"
          flutter build windows --release `
            --dart-define=COUNTLY_SERVER_URL="$env:COUNTLY_SERVER_URL" `
            --dart-define=COUNTLY_APP_KEY="$key"
      
      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS Installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Prepare Windows Package
        run: |
          New-Item -ItemType Directory -Force -Path windows_package
          Copy-Item -Path "build\windows\x64\runner\Release\*" -Destination "windows_package\" -Recurse -Force
          Copy-Item -Path "musly-setup.exe" -Destination "windows_package\" -Force

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: windows_package/

  # Linux Build
  build-linux:
    runs-on: ubuntu-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libasound2-dev libnotify-dev
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Dart SDK Version
        run: |
          DART_VERSION=$(dart --version | grep -oP 'Dart SDK version: \K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "✅ Dart SDK version: $DART_VERSION"
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Linux
        env:
          COUNTLY_SERVER_URL: ${{ secrets.COUNTLY_SERVER_URL }}
          COUNTLY_APP_KEY: ${{ secrets.COUNTLY_APP_KEY }}
        run: |
          echo "::add-mask::$COUNTLY_APP_KEY"
          flutter build linux --release \
            --dart-define=COUNTLY_SERVER_URL="$COUNTLY_SERVER_URL" \
            --dart-define=COUNTLY_APP_KEY="$COUNTLY_APP_KEY"
      
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/

  # macOS Build
  build-macos:
    runs-on: macos-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Dart SDK Version
        run: |
          DART_VERSION=$(dart --version | grep -oP 'Dart SDK version: \K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "✅ Dart SDK version: $DART_VERSION"
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS
        env:
          COUNTLY_SERVER_URL: ${{ secrets.COUNTLY_SERVER_URL }}
          COUNTLY_APP_KEY: ${{ secrets.COUNTLY_APP_KEY }}
        run: |
          echo "::add-mask::$COUNTLY_APP_KEY"
          flutter build macos --release \
            --dart-define=COUNTLY_SERVER_URL="$COUNTLY_SERVER_URL" \
            --dart-define=COUNTLY_APP_KEY="$COUNTLY_APP_KEY"
      
      - name: Create DMG
        run: |
          set -e
          APP_PATH="build/macos/Build/Products/Release/musly.app"
          DMG_NAME="musly-macos"

          echo "Verifying app exists at $APP_PATH..."
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App not found at $APP_PATH"
            ls -la build/macos/Build/Products/Release/
            exit 1
          fi

          echo "Creating temporary directory for DMG contents..."
          TEMP_DIR=$(mktemp -d)
          cp -r "$APP_PATH" "$TEMP_DIR/"
          ln -s /Applications "$TEMP_DIR/Applications"

          echo "Creating DMG with hdiutil..."
          hdiutil create -srcfolder "$TEMP_DIR" -volname "Musly" -fs HFS+ -format UDRW -size 200M "${DMG_NAME}_temp.dmg"

          echo "Converting to compressed DMG..."
          hdiutil convert "${DMG_NAME}_temp.dmg" -format UDZO -o "${DMG_NAME}.dmg"

          echo "Cleaning up..."
          rm -rf "$TEMP_DIR" "${DMG_NAME}_temp.dmg"

          echo "Verifying DMG was created..."
          if [ ! -f "${DMG_NAME}.dmg" ]; then
            echo "Error: DMG was not created!"
            exit 1
          fi

          ls -lh "${DMG_NAME}.dmg"
          echo "DMG created successfully!"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: musly-macos.dmg

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/

  # Create Release with all artifacts
  release:
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-windows, build-linux, build-macos]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ github.event.inputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; reusing it for this release."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android/

      - name: Download iOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-build
          path: artifacts/ios/

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows/

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux/

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/macos-dmg/

      - name: Package Windows
        run: |
          cd artifacts/windows
          zip -r ../../musly-windows.zip .
          cd ../..

      - name: Package Linux
        run: |
          cd artifacts/linux
          tar -czf ../../musly-linux-x64.tar.gz .
          cd ../..

      - name: Package macOS
        run: |
          cp artifacts/macos-dmg/*.dmg musly-macos.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Musly v${{ github.event.inputs.version }}
          body: |
            ## 🎉 Musly v${{ github.event.inputs.version }}

            ### 📦 Downloads

            **Android:**
            - `app-release.apk` (universal APK for all devices)

            **iOS:**
            - `musly-ios.ipa` (sideload with AltStore, Sideloadly, or similar — not signed)

            **Windows:**
            - `musly-setup.exe` (setup installer, run to install Musly)
            - `musly-windows.zip` (portable version, extract and run)

            **macOS:**
            - `musly-macos.dmg` (drag Musly.app to Applications — not notarized)

            **Linux:**
            - `musly-linux-x64.tar.gz` (extract and run musly)

            ### 📝 Changelog
            See [CHANGELOG.md](https://github.com/lvshp/Musly/blob/master/CHANGELOG.md)

            ### 🌍 Translations
            Contribute translations at [Crowdin](https://crowdin.com/project/musly)
          files: |
            artifacts/android/*.apk
            artifacts/ios/*.ipa
            artifacts/windows/musly-setup.exe
            musly-windows.zip
            musly-linux-x64.tar.gz
            musly-macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
